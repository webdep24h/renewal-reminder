name: 🔔 Daily Renewal Check

on:
  # Chạy hàng ngày lúc 8:00 AM (UTC+7 = 01:00 UTC)
  schedule:
    - cron: '0 1 * * *'
  # Cho phép chạy thủ công
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (chỉ hiển thị kết quả, không gửi thông báo)'
        required: false
        default: 'false'

jobs:
  check-renewals:
    name: Check Renewal Expirations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🔍 Trigger renewal check
        run: |
          echo "🕐 Time: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "🌐 Calling: ${{ secrets.APP_URL }}/api/cron/check-renewals"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/cron/check-renewals")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "📊 HTTP Status: $HTTP_CODE"
          echo "📋 Response:"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Cron job failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Cron job completed successfully"

      - name: 📧 Notify on failure
        if: failure()
        run: |
          echo "⚠️ Renewal check cron job FAILED"
          echo "Please check the Cloudflare Pages logs"
          # Add Slack/Email notification here if needed
